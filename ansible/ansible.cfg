[defaults]
inventory          = inventory/
roles_path         = roles
remote_user        = ubuntu
private_key_file   = ../.ssh/dt-demo.pem
host_key_checking  = False
stdout_callback    = yaml
retry_files_enabled = False
gathering          = smart
fact_caching       = memory

# Vault password file — contains only the vault password, not secrets
# Create with: echo "your-vault-password" > .vault_pass && chmod 600 .vault_pass
vault_password_file = ../.vault_pass

[ssh_connection]
# ControlPersist keeps SSH connections alive between tasks — speeds up playbook runs
ssh_args      = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining    = True

[privilege_escalation]
become        = True
become_method = sudo
